<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.5; color: #222;
    max-width: 900px; margin: 0 auto; padding: 20px;
    background: #f5f5f0;
  }
  h1 { font-size: 22px; margin-bottom: 6px; color: #e74c3c; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
  .chapter-group { margin-bottom: 40px; }
  .chapter-group h2 { font-size: 18px; color: #c0392b; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e74c3c; }
  .topic { margin-bottom: 16px; border: 1px solid #ddd; border-radius: 10px; background: #fff; overflow: hidden; }
  .topic-header {
    padding: 14px 18px; background: #f8f9fa; border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .topic-header h3 { font-size: 15px; flex: 1; }
  .topic-header .arrow { transition: transform 0.2s; font-size: 12px; color: #999; }
  .topic.open .topic-header .arrow { transform: rotate(90deg); }
  .topic-body { display: none; }
  .topic.open .topic-body { display: block; }
  .option { border-bottom: 1px solid #f0f0f0; padding: 16px 18px; }
  .option:last-child { border-bottom: none; }
  .option-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .option-header strong { font-size: 14px; }
  .option-header a { font-size: 12px; color: #2e86c1; }
  .ggb-container { width: 100%; max-width: 700px; margin: 0 auto; }
  .load-btn {
    display: inline-block; padding: 8px 20px; background: #e74c3c; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .load-btn:hover { background: #c0392b; }
  .load-btn:disabled { background: #ccc; cursor: default; }
  .pick-btn {
    display: inline-block; padding: 6px 16px; background: #27ae60; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
    margin-left: 8px;
  }
  .pick-btn:hover { background: #1e8449; }
  .picked { background: #d5f5e3; border: 2px solid #27ae60; }
  #picks {
    position: sticky; top: 0; z-index: 10; background: #fff3cd; padding: 12px 18px;
    border-radius: 8px; margin-bottom: 20px; font-size: 13px; border: 1px solid #ffc107;
    max-height: 40vh; overflow-y: auto;
  }
  #picks strong { color: #856404; }
  #picks code { background: #fff; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .pick-line { margin: 2px 0; }
  .note { font-size: 13px; color: #888; font-style: italic; padding: 8px 18px; }
</style>
</head>

var picks = {};
var counter = 0;

function renderAll() {
  var root = document.getElementById('topics');
  chapters.forEach(function(ch, ci) {
    var group = document.createElement('div');
    group.className = 'chapter-group';
    var h2 = document.createElement('h2');
    h2.textContent = ch.chapter;
    group.appendChild(h2);

    ch.topics.forEach(function(topic, ti) {
      var key = ci + '-' + ti;
      var div = document.createElement('div');
      div.className = 'topic';
      div.id = 'topic-' + key;

      var header = document.createElement('div');
      header.className = 'topic-header';
      header.onclick = function() { div.classList.toggle('open'); };

      var arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '\u25B6';
      header.appendChild(arrow);

      var h3 = document.createElement('h3');
      h3.textContent = topic.name;
      header.appendChild(h3);

      div.appendChild(header);

      var body = document.createElement('div');
      body.className = 'topic-body';

      topic.options.forEach(function(opt, oi) {
        var optDiv = document.createElement('div');
        optDiv.className = 'option';
        optDiv.id = 'opt-' + key + '-' + oi;

        var optHeader = document.createElement('div');
        optHeader.className = 'option-header';

        var strong = document.createElement('strong');
        strong.textContent = opt.title;
        optHeader.appendChild(strong);

        var link = document.createElement('a');
        link.href = 'https://www.geogebra.org/m/' + opt.id;
        link.target = '_blank';
        link.textContent = opt.id;
        optHeader.appendChild(link);

        optDiv.appendChild(optHeader);

        var btnRow = document.createElement('div');
        btnRow.style.marginTop = '8px';
        btnRow.style.display = 'flex';
        btnRow.style.alignItems = 'center';
        btnRow.style.gap = '8px';

        var ggbDiv = document.createElement('div');
        ggbDiv.className = 'ggb-container';
        ggbDiv.id = 'ggb-' + key + '-' + oi;

        var loadBtn = document.createElement('button');
        loadBtn.className = 'load-btn';
        loadBtn.textContent = 'Load Applet';
        loadBtn.onclick = (function(gId, gDiv, btn) {
          return function() {
            btn.disabled = true;
            btn.textContent = 'Loading...';
            var applet = new GGBApplet({
              material_id: gId,
              scaleContainerClass: 'ggb-container',
              showToolBar: false,
              showMenuBar: false,
              showAlgebraInput: false,
              showResetIcon: true,
              enableRightClick: false,
              allowStyleBar: false,
              enableLabelDrags: false,
              enableShiftDragZoom: false,
              appletOnLoad: function() { btn.textContent = 'Loaded'; }
            }, true);
            applet.inject(gDiv);
          };
        })(opt.id, ggbDiv, loadBtn);

        var pickBtn = document.createElement('button');
        pickBtn.className = 'pick-btn';
        pickBtn.textContent = '\u2713 Pick This One';
        pickBtn.onclick = (function(pKey, topicName, chName, optId, optTitle, optDiv) {
          return function() {
            picks[pKey] = { id: optId, title: optTitle, topic: topicName, chapter: chName };
            var siblings = optDiv.parentNode.querySelectorAll('.option');
            siblings.forEach(function(s) { s.classList.remove('picked'); });
            optDiv.classList.add('picked');
            updatePicks();
          };
        })(key, topic.name, ch.chapter, opt.id, opt.title, optDiv);

        btnRow.appendChild(loadBtn);
        btnRow.appendChild(pickBtn);
        optDiv.appendChild(btnRow);
        optDiv.appendChild(ggbDiv);
        body.appendChild(optDiv);
      });

      div.appendChild(body);
      group.appendChild(div);
    });

    root.appendChild(group);
  });
}

function updatePicks() {
  var el = document.getElementById('pickList');
  var keys = Object.keys(picks);
  if (keys.length === 0) {
    el.textContent = 'none yet';
    return;
  }
  while (el.firstChild) el.removeChild(el.firstChild);
  keys.sort();
  var lastCh = '';
  keys.forEach(function(k) {
    var p = picks[k];
    if (p.chapter !== lastCh) {
      lastCh = p.chapter;
      var chDiv = document.createElement('div');
      chDiv.style.fontWeight = '700';
      chDiv.style.marginTop = '6px';
      chDiv.style.color = '#856404';
      chDiv.textContent = p.chapter;
      el.appendChild(chDiv);
    }
    var line = document.createElement('div');
    line.className = 'pick-line';
    var text = document.createTextNode(p.topic + ': ');
    line.appendChild(text);
    var code = document.createElement('code');
    code.textContent = p.id;
    line.appendChild(code);
    var title = document.createTextNode(' — ' + p.title);
    line.appendChild(title);
    el.appendChild(line);
  });
}

renderAll();
</script>
